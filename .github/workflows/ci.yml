name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Match the supported range in pyproject.toml
        # (tesseract-decoder has no 3.14 wheels yet).
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest -q

  mpi:
    name: MPI driver (OpenMPI, Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install OpenMPI
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin libopenmpi-dev

      - name: Install package + MPI extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[mpi]"

      - name: Run MPI tests
        # Oversubscribe: the runner has fewer cores than the ranks these spawn.
        env:
          OMPI_MCA_rmaps_base_oversubscribe: "1"
        run: python -m pytest -q -m mpi tests/test_mpi.py
